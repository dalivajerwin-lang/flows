# TanStack Start SSR deployed via the Nitro "netlify" preset (see vite.config.ts).
# The build emits static assets to dist/ and the SSR handler to
# .netlify/functions-internal/ — Netlify picks the function up automatically.
# No SPA fallback rewrite: the server function is registered for /* (preferStatic),
# so unmatched routes are server-rendered rather than rewritten to index.html.

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "http://tenacious.netlify.app/*"
  to = "https://tenacious.netlify.app/:splat"
  status = 301
  force = true

# Manifest — this app references /manifest.webmanifest in the root <head>; keep
# the header rule aligned to that filename.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
